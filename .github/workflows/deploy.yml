name: Deploy to DGX

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull & Build & Deploy
        run: |
          set -e
          export PATH="/home/admin/.nvm/versions/node/v24.15.0/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          ROOT=~/Documents/MultiModel/dgx-spark-llm-stack
          cd $ROOT

          # Always get clean copy from git
          git fetch origin
          git reset --hard origin/main

          # Build frontend into wwwroot
          cd $ROOT/frontend
          npm run build 2>&1 | tail -3

          # Publish .NET app (includes wwwroot, DLLs, Skills)
          cd $ROOT/dotnet/Api
          dotnet publish -c Release -o /tmp/setllm-publish 2>&1 | tail -3

          # Copy Skills (not in publish output)
          cp -r $ROOT/dotnet/Api/Skills /tmp/setllm-publish/

          # Preserve appsettings (has keys) then swap
          cp /opt/setllm-api/appsettings.json /tmp/setllm-publish/appsettings.json
          sudo rm -rf /opt/setllm-api
          sudo mv /tmp/setllm-publish /opt/setllm-api
          sudo chown -R admin:admin /opt/setllm-api

          sudo systemctl restart setllm-api
          sleep 5
          curl -s http://localhost:5080/health && echo " deployed OK"

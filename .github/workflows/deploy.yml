name: Deploy to DGX

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull & Build & Deploy
        run: |
          set -e
          export PATH="/home/admin/.nvm/versions/node/v24.15.0/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          ROOT=~/Documents/MultiModel/dgx-spark-llm-stack
          cd $ROOT

          git fetch origin
          git reset --hard origin/main

          # Frontend build
          cd $ROOT/frontend
          chmod +x node_modules/.bin/* 2>/dev/null || true
          npm run build 2>&1 | tail -3

          # Backend publish
          cd $ROOT/dotnet/Api
          dotnet publish -c Release -o /tmp/setllm-publish 2>&1 | tail -3

          # Copy Skills
          cp -r $ROOT/dotnet/Api/Skills /tmp/setllm-publish/

          # Preserve appsettings keys
          cp /opt/setllm-api/appsettings.json /tmp/setllm-publish/appsettings.json

          # Swap (no sudo needed — admin owns /opt/setllm-api)
          rm -rf /opt/setllm-api
          mv /tmp/setllm-publish /opt/setllm-api

          systemctl restart setllm-api
          sleep 5
          curl -s http://localhost:5080/health && echo " deployed OK"

name: Deploy to DGX

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull & Build & Deploy
        run: |
          set -eo pipefail
          export PATH="/home/admin/.nvm/versions/node/v24.15.0/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          ROOT=~/Documents/MultiModel/dgx-spark-llm-stack
          cd $ROOT

          git fetch origin
          git reset --hard origin/main

          # ── vLLM model name validation (non-blocking, warns on mismatch) ──────
          VLLM_KEY=$(grep '^VLLM_KEY=' $ROOT/.env 2>/dev/null | cut -d= -f2 || true)
          if [ -n "$VLLM_KEY" ]; then
            for SERVICE in "gemma:8000:GEMMA_MODEL_NAME" "qwen:8002:QWEN_MODEL_NAME"; do
              NAME=$(echo $SERVICE | cut -d: -f1)
              PORT=$(echo $SERVICE | cut -d: -f2)
              ENVKEY=$(echo $SERVICE | cut -d: -f3)
              EXPECTED=$(grep "^${ENVKEY}=" $ROOT/.env 2>/dev/null | cut -d= -f2 | sed 's|openai/||' || true)
              ACTUAL=$(curl -sf -H "Authorization: Bearer $VLLM_KEY" \
                http://localhost:${PORT}/v1/models 2>/dev/null | \
                python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data'][0]['id'])" 2>/dev/null || echo "unreachable")
              if [ "$ACTUAL" = "unreachable" ]; then
                echo "⚠️  vLLM $NAME (port $PORT) unreachable — skip validation"
              elif [ "$ACTUAL" != "$EXPECTED" ]; then
                echo "⚠️  vLLM $NAME model mismatch: .env=$EXPECTED actual=$ACTUAL — update .env!"
              else
                echo "✅ vLLM $NAME model OK: $ACTUAL"
              fi
            done
          fi

          # ── Frontend build ────────────────────────────────────────────────────
          cd $ROOT/frontend
          chmod +x node_modules/.bin/* 2>/dev/null || true
          npm run build

          # ── Backend publish ───────────────────────────────────────────────────
          cd $ROOT/dotnet/Api
          dotnet publish -c Release -o /tmp/setllm-publish

          # ── Deploy ────────────────────────────────────────────────────────────
          cp -r $ROOT/dotnet/Api/Skills /tmp/setllm-publish/

          if [ -f ~/setllm-api/appsettings.json ]; then
            cp ~/setllm-api/appsettings.json /tmp/setllm-publish/appsettings.json
          fi

          rm -rf ~/setllm-api
          mv /tmp/setllm-publish ~/setllm-api

          sudo sed -i 's|/opt/setllm-api|/home/admin/setllm-api|g' /etc/setllm/env 2>/dev/null || true

          sudo systemctl restart setllm-api
          sleep 5
          curl -s http://localhost:5080/health && echo " deployed OK"

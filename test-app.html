<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET LLM Server</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #a78bfa;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4b5563;
      flex-shrink: 0;
    }

    .status-dot.ok {
      background: #10b981;
    }

    .status-dot.err {
      background: #ef4444;
    }

    #status-text {
      font-size: 12px;
      color: #6b7280;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #1a1d2e;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 14px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .05em;
      display: block;
      margin-bottom: 4px;
    }

    .sidebar input,
    .sidebar select,
    .sidebar textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }

    .sidebar input:focus,
    .sidebar select:focus,
    .sidebar textarea:focus {
      border-color: #7c3aed;
    }

    .sidebar textarea {
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }

    .sidebar select option {
      background: #1a1d2e;
    }

    .param-row {
      display: flex;
      gap: 8px;
    }

    .param-row>div {
      flex: 1;
    }

    .endpoints {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .endpoint-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .endpoint-item:hover {
      border-color: #4c1d95;
    }

    .endpoint-item.active {
      border-color: #7c3aed;
      background: #1e1040;
    }

    .endpoint-item .ep-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4b5563;
      flex-shrink: 0;
    }

    .endpoint-item.active .ep-dot {
      background: #10b981;
    }

    .endpoint-info {
      flex: 1;
      overflow: hidden;
    }

    .endpoint-info .ep-name {
      font-weight: 600;
      color: #c4b5fd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .endpoint-info .ep-url {
      font-size: 11px;
      color: #4b5563;
    }

    .btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-primary {
      background: #7c3aed;
      color: #fff;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-danger {
      background: #1a1d2e;
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .btn-danger:hover {
      background: #1f0a0a;
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
      width: auto;
    }

    .section-title {
      font-size: 11px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid #2d3148;
      padding-bottom: 6px;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 860px;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .msg-avatar {
      background: #7c3aed;
    }

    .msg.assistant .msg-avatar {
      background: #1e3a5f;
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: #4c1d95;
      color: #ede9fe;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .msg-bubble {
      background: #1e293b;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      font-size: 11px;
      color: #4b5563;
      padding: 0 4px;
    }

    .msg.user .msg-meta {
      text-align: right;
    }

    .thinking-block {
      background: #0a1628;
      border-left: 3px solid #3b82f6;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #60a5fa;
      margin-bottom: 6px;
      max-height: 120px;
      overflow-y: auto;
    }

    .thinking-label {
      font-size: 10px;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 4px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #7c3aed;
      animation: blink .7s step-end infinite;
      vertical-align: middle;
      margin-left: 1px;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* Input bar */
    .input-bar {
      border-top: 1px solid #2d3148;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #1a1d2e;
    }

    #user-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 160px;
      min-height: 44px;
      font-family: inherit;
      line-height: 1.5;
    }

    #user-input:focus {
      border-color: #7c3aed;
    }

    #send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      height: 44px;
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: #6d28d9;
    }

    #send-btn:disabled {
      background: #3b3b5c;
      cursor: not-allowed;
    }

    .stats-bar {
      background: #0f1117;
      border-top: 1px solid #1e293b;
      padding: 4px 20px;
      font-size: 11px;
      color: #4b5563;
      display: flex;
      gap: 16px;
    }

    code {
      background: #0f1117;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #374151;
      gap: 8px;
    }

    .empty-state svg {
      opacity: .3;
    }

    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>vLLM Test Client</h1>
    <div class="status-dot" id="header-dot"></div>
    <span id="status-text">not connected</span>
    <div style="flex:1"></div>
    <span id="active-model" style="font-size:12px;color:#6b7280;"></span>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">

      <div class="section-title">Endpoints</div>
      <div class="endpoints" id="endpoints-list"></div>

      <div>
        <label>Custom Base URL</label>
        <input id="custom-url" placeholder="http://172.16.1.123:8001" />
      </div>
      <div>
        <label>Model Name</label>
        <input id="custom-model" placeholder="auto-detect" />
      </div>
      <div>
        <label>API Key</label>
        <input id="api-key" type="password" value="9cbef01e3edede04363783bbe87ed51fc178aa0a3586697cde4aa915ebcdaecf" />
      </div>
      <button class="btn btn-primary" onclick="connectCustom()">Connect</button>

      <div class="section-title">Parameters</div>
      <div class="param-row">
        <div>
          <label>Max Tokens</label>
          <input id="max-tokens" type="number" value="512" min="1" max="32768" />
        </div>
        <div>
          <label>Temperature</label>
          <input id="temperature" type="number" value="0.7" min="0" max="2" step="0.1" />
        </div>
      </div>
      <div>
        <label>Stream</label>
        <select id="stream-mode">
          <option value="true">Enabled</option>
          <option value="false">Disabled</option>
        </select>
      </div>
      <div>
        <label>System Prompt</label>
        <textarea id="system-prompt" placeholder="Optional system prompt..."></textarea>
      </div>

      <div style="margin-top:auto; display:flex; flex-direction:column; gap:6px;">
        <button class="btn btn-danger" onclick="clearChat()">Clear Chat</button>
      </div>

    </div>

    <!-- Chat -->
    <div class="chat-area">
      <div id="messages">
        <div class="empty-state" id="empty-state">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
          <p>Select an endpoint and start chatting</p>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar" style="display:none">
        <span id="stat-ttft">TTFT: —</span>
        <span id="stat-tps">tok/s: —</span>
        <span id="stat-tokens">tokens: —</span>
        <span id="stat-elapsed">elapsed: —</span>
      </div>
      <div class="input-bar">
        <textarea id="user-input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
          rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────────
    const ENDPOINTS = [
      { name: "Gemma 4 31B FP4", port: 8000, model: null, host: null },
      { name: "Qwen 2.5 Coder 7B", port: 8001, model: null, host: null },
      { name: "GPT-OSS 120B (Passive)", port: 8002, model: null, host: null },
    ];

    let activeBaseUrl = null;
    let activeModel = null;
    let history = [];
    let generating = false;
    let activeEpIdx = null;

    // ── Init ─────────────────────────────────────────────────────────────────────
    function init() {
      const host = window.location.hostname !== "" && window.location.hostname !== "localhost"
        ? window.location.hostname
        : "172.16.1.123";

      ENDPOINTS.forEach(ep => ep.host = host);

      renderEndpoints();
      autoConnect();
    }

    function renderEndpoints() {
      const list = document.getElementById("endpoints-list");
      list.innerHTML = "";
      ENDPOINTS.forEach((ep, i) => {
        const div = document.createElement("div");
        div.className = "endpoint-item" + (i === activeEpIdx ? " active" : "");
        div.onclick = () => connectEndpoint(i);
        div.innerHTML = `
      <div class="ep-dot"></div>
      <div class="endpoint-info">
        <div class="ep-name">${ep.name}</div>
        <div class="ep-url">${ep.host}:${ep.port}</div>
      </div>`;
        list.appendChild(div);
      });
    }

    async function autoConnect() {
      for (let i = 0; i < ENDPOINTS.length; i++) {
        const ep = ENDPOINTS[i];
        const url = `http://${ep.host}:${ep.port}`;
        const ok = await checkHealth(url);
        if (ok) { connectEndpoint(i); return; }
      }
    }

    // ── Connection ────────────────────────────────────────────────────────────────
    async function checkHealth(baseUrl) {
      try {
        const r = await fetch(baseUrl + "/health", { signal: AbortSignal.timeout(3000) });
        return r.ok;
      } catch { return false; }
    }

    async function detectModel(baseUrl) {
      try {
        const r = await fetch(baseUrl + "/v1/models", {
          headers: { Authorization: "Bearer " + apiKey() },
          signal: AbortSignal.timeout(4000)
        });
        const j = await r.json();
        return j.data?.[0]?.id || null;
      } catch { return null; }
    }

    async function connectEndpoint(idx) {
      const ep = ENDPOINTS[idx];
      activeEpIdx = idx;
      const url = `http://${ep.host}:${ep.port}`;
      await connect(url, ep.model);
      renderEndpoints();
    }

    async function connectCustom() {
      const url = document.getElementById("custom-url").value.trim().replace(/\/$/, "");
      const model = document.getElementById("custom-model").value.trim() || null;
      if (!url) return;
      activeEpIdx = null;
      renderEndpoints();
      await connect(url, model);
    }

    async function connect(baseUrl, modelHint) {
      setStatus("connecting…", null);
      const ok = await checkHealth(baseUrl);
      if (!ok) { setStatus("unreachable", false); return; }

      const model = modelHint || await detectModel(baseUrl) || "unknown";
      activeBaseUrl = baseUrl;
      activeModel = model;

      document.getElementById("custom-url").value = baseUrl;
      document.getElementById("custom-model").value = model;
      document.getElementById("active-model").textContent = model;
      document.getElementById("send-btn").disabled = false;
      setStatus("connected", true);
    }

    function setStatus(text, ok) {
      document.getElementById("status-text").textContent = text;
      const dot = document.getElementById("header-dot");
      dot.className = "status-dot" + (ok === true ? " ok" : ok === false ? " err" : "");
    }

    // ── Chat ──────────────────────────────────────────────────────────────────────
    function apiKey() { return document.getElementById("api-key").value.trim(); }
    function maxTokens() { return parseInt(document.getElementById("max-tokens").value) || 512; }
    function temp() { return parseFloat(document.getElementById("temperature").value) || 0.7; }
    function streaming() { return document.getElementById("stream-mode").value === "true"; }
    function sysPrompt() { return document.getElementById("system-prompt").value.trim(); }

    function clearChat() {
      history = [];
      document.getElementById("messages").innerHTML = `<div class="empty-state" id="empty-state">
    <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
    <p>Select an endpoint and start chatting</p>
  </div>`;
      document.getElementById("stats-bar").style.display = "none";
    }

    function appendMessage(role, content, meta) {
      const empty = document.getElementById("empty-state");
      if (empty) empty.remove();

      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;

      const avatar = role === "user" ? "U" : "AI";
      div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-bubble" id="bubble-${Date.now()}"></div>
      <div class="msg-meta">${meta || ""}</div>
    </div>`;

      container.appendChild(div);
      const bubble = div.querySelector(".msg-bubble");
      bubble.textContent = content;
      container.scrollTop = container.scrollHeight;
      return bubble;
    }

    async function sendMessage() {
      if (!activeBaseUrl || generating) return;
      const input = document.getElementById("user-input");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      input.style.height = "auto";
      generating = true;
      document.getElementById("send-btn").disabled = true;

      appendMessage("user", text, new Date().toLocaleTimeString());
      history.push({ role: "user", content: text });

      const messages = [];
      if (sysPrompt()) messages.push({ role: "system", content: sysPrompt() });
      messages.push(...history);

      const bubble = appendMessage("assistant", "", "");
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      bubble.appendChild(cursor);

      let thinkingDiv = null;
      let thinkBuf = "";
      let mainBuf = "";
      let inThink = false;

      const t0 = performance.now();
      let ttft = null;
      let tokenCount = 0;

      try {
        const body = {
          model: activeModel,
          messages,
          max_tokens: maxTokens(),
          temperature: temp(),
          stream: streaming(),
        };

        if (streaming()) {
          const resp = await fetch(activeBaseUrl + "/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: "Bearer " + apiKey() },
            body: JSON.stringify(body),
          });

          if (!resp.ok) {
            const err = await resp.text();
            bubble.textContent = "Error: " + err;
            finalize(t0, 0, null);
            return;
          }

          const reader = resp.body.getReader();
          const dec = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const lines = dec.decode(value, { stream: true }).split("\n");
            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const data = line.slice(6).trim();
              if (data === "[DONE]") break;
              try {
                const j = JSON.parse(data);
                const delta = j.choices?.[0]?.delta?.content || "";
                if (!delta) continue;
                if (ttft === null) ttft = performance.now() - t0;
                tokenCount++;
                processToken(delta);
              } catch { }
            }
          }

        } else {
          const resp = await fetch(activeBaseUrl + "/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: "Bearer " + apiKey() },
            body: JSON.stringify(body),
          });
          const j = await resp.json();
          if (j.error) { bubble.textContent = "Error: " + JSON.stringify(j.error); finalize(t0, 0, null); return; }
          const content = j.choices?.[0]?.message?.content || "";
          ttft = performance.now() - t0;
          tokenCount = j.usage?.completion_tokens || content.split(" ").length;
          for (const ch of content) processToken(ch);
        }

      } catch (e) {
        bubble.textContent = "Error: " + e.message;
      } finally {
        cursor.remove();
        finalize(t0, tokenCount, ttft);
        history.push({ role: "assistant", content: mainBuf || thinkBuf });
        generating = false;
        document.getElementById("send-btn").disabled = false;
        document.getElementById("messages").scrollTop = 9999;
      }

      function processToken(token) {
        // detect <think>...</think>
        const combined = (inThink ? thinkBuf : mainBuf) + token;

        if (!inThink && combined.includes("<think>")) {
          inThink = true;
          const parts = combined.split("<think>");
          mainBuf = parts[0];
          thinkBuf = parts[1] || "";
          if (!thinkingDiv) {
            thinkingDiv = document.createElement("div");
            thinkingDiv.className = "thinking-block";
            thinkingDiv.innerHTML = `<div class="thinking-label">Thinking</div><div id="think-content"></div>`;
            bubble.parentNode.insertBefore(thinkingDiv, bubble);
          }
          bubble.textContent = mainBuf;
          bubble.appendChild(cursor);
          thinkingDiv.querySelector("#think-content").textContent = thinkBuf;
          return;
        }

        if (inThink && combined.includes("</think>")) {
          inThink = false;
          const parts = combined.split("</think>");
          thinkBuf = parts[0];
          mainBuf += parts[1] || "";
          if (thinkingDiv) thinkingDiv.querySelector("#think-content").textContent = thinkBuf;
          bubble.textContent = mainBuf;
          bubble.appendChild(cursor);
          return;
        }

        if (inThink) {
          thinkBuf += token;
          if (thinkingDiv) thinkingDiv.querySelector("#think-content").textContent = thinkBuf;
        } else {
          mainBuf += token;
          bubble.textContent = mainBuf;
          bubble.appendChild(cursor);
        }

        document.getElementById("messages").scrollTop = 9999;
      }

      function finalize(t0, tokens, ttft) {
        const elapsed = (performance.now() - t0) / 1000;
        const tps = tokens > 0 ? (tokens / elapsed).toFixed(1) : "—";
        document.getElementById("stats-bar").style.display = "flex";
        document.getElementById("stat-ttft").textContent = "TTFT: " + (ttft ? (ttft / 1000).toFixed(2) + "s" : "—");
        document.getElementById("stat-tps").textContent = "tok/s: " + tps;
        document.getElementById("stat-tokens").textContent = "tokens: " + tokens;
        document.getElementById("stat-elapsed").textContent = "elapsed: " + elapsed.toFixed(2) + "s";
      }
    }

    // ── Input auto-resize + Enter key ────────────────────────────────────────────
    const input = document.getElementById("user-input");
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    });
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    init();
  </script>
</body>

</html>

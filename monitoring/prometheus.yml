# =============================================================================
# Prometheus scrape config — DGX Spark LLM Stack
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dgx-spark
    environment: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # Add Alertmanager here when deployed

scrape_configs:
  # ─── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ─── NVIDIA DCGM (GPU metrics) ─────────────────────────────────────────────
  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "DCGM_FI_DEV_(FB_USED|FB_TOTAL|GPU_UTIL|MEM_COPY_UTIL|GPU_TEMP|POWER_USAGE|SM_CLOCK)"
        action: keep

  # ─── vLLM model servers ────────────────────────────────────────────────────
  - job_name: vllm-gemma
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm-gemma:8000"]
        labels: { model: gemma4-31b, tier: hot }
    scheme: http

  - job_name: vllm-qwen
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm-qwen:8000"]
        labels: { model: qwen-coder, tier: hot }
    scheme: http

  - job_name: vllm-gptoss
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm-gptoss:8000"]
        labels: { model: gpt-oss-120b, tier: cold }
    scheme: http

  # ─── LiteLLM Gateway ───────────────────────────────────────────────────────
  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]

  # ─── Traefik ───────────────────────────────────────────────────────────────
  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]

  # ─── Container metrics ─────────────────────────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # ─── SET LLM API (.NET) ────────────────────────────────────────────────────
  - job_name: setllm-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5080"]
        labels: { service: setllm-api }

  # ─── Redis ─────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]
    # Note: Requires redis_exporter sidecar for actual metrics
